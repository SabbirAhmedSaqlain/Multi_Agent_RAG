<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Multi-Agent RAG</title>
<style>
  :root {
    --bg: #f6f7f9; --panel: #ffffff; --text: #1a1d21; --muted: #6b7280;
    --border: #e5e7eb; --accent: #4f46e5; --accent-soft: #eef2ff;
    --ok: #16a34a; --warn: #d97706; --err: #dc2626; --code: #f3f4f6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115; --panel: #171a21; --text: #e5e7eb; --muted: #9ca3af;
      --border: #2a2f3a; --accent: #818cf8; --accent-soft: #1e2038;
      --ok: #4ade80; --warn: #fbbf24; --err: #f87171; --code: #11141a;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 24px 16px 64px; }
  header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  header h1 { font-size: 20px; font-weight: 700; }
  header .sub { color: var(--muted); font-size: 13px; }
  .badge {
    margin-left: auto; font-size: 12px; padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--panel); color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.ok { background: var(--ok); } .dot.err { background: var(--err); } .dot.warn { background: var(--warn); }
  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 16px;
  }
  textarea {
    width: 100%; min-height: 72px; resize: vertical; padding: 12px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font: inherit;
  }
  textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
  button {
    padding: 9px 18px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); font: inherit; font-weight: 600; cursor: pointer;
  }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button:not(:disabled):hover { filter: brightness(1.08); }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .chip {
    font-size: 12px; padding: 3px 10px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent); font-weight: 600;
  }
  .chip.ok { background: color-mix(in srgb, var(--ok) 14%, transparent); color: var(--ok); }
  .chip.warn { background: color-mix(in srgb, var(--warn) 14%, transparent); color: var(--warn); }
  #answer { white-space: normal; word-wrap: break-word; }
  #answer h1, #answer h2, #answer h3 { margin: 14px 0 6px; font-size: 16px; }
  #answer p, #answer ul, #answer ol { margin: 8px 0; }
  #answer li { margin-left: 20px; }
  #answer code { background: var(--code); padding: 1px 5px; border-radius: 4px; font-size: 13px; }
  #answer pre { background: var(--code); padding: 10px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
  .muted { color: var(--muted); font-size: 13px; }
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite; display: inline-block; vertical-align: -3px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  details summary { cursor: pointer; font-weight: 600; font-size: 14px; user-select: none; }
  details[open] summary { margin-bottom: 10px; }
  select, input[type=number] {
    padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font: inherit;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  td { padding: 4px 8px; border-bottom: 1px solid var(--border); }
  td:first-child { color: var(--muted); }
  .examples { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .examples button { font-size: 12px; font-weight: 400; padding: 4px 10px; border-radius: 999px; color: var(--muted); }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🧠 Multi-Agent RAG</h1>
    <span class="sub">QueryAnalyzer → Retriever → Analyzer → Synthesizer → Critic</span>
    <span class="badge" id="health"><span class="dot" id="healthDot"></span><span id="healthText">checking…</span></span>
  </header>

  <div class="panel">
    <textarea id="query" placeholder="Ask anything about the knowledge base…"></textarea>
    <div class="row">
      <button class="primary" id="ask">Ask</button>
      <span id="status" class="muted"></span>
    </div>
    <div class="examples" id="examples"></div>
  </div>

  <div class="panel hidden" id="resultPanel">
    <div class="chips" id="chips"></div>
    <div id="answer"></div>
    <details style="margin-top:12px">
      <summary class="muted">Step timings</summary>
      <table id="timings"></table>
    </details>
  </div>

  <div class="panel">
    <details>
      <summary>📚 Knowledge base</summary>
      <table id="stats"></table>
      <div class="row">
        <select id="dataset"></select>
        <input type="number" id="maxDocs" value="100" min="1" max="100000" style="width:90px" title="max docs">
        <button id="ingest">Ingest dataset</button>
        <button id="refresh">Refresh data</button>
        <span id="kbStatus" class="muted"></span>
      </div>
    </details>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const api = (path, opts) => fetch(path, opts).then(async r => {
  const body = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(body.detail || r.statusText);
  return body;
});

// Tiny markdown renderer (headings, bold, italics, code, lists) — good enough for answers
function md(text) {
  let esc = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  esc = esc.replace(/```([\s\S]*?)```/g, (_, c) => `<pre><code>${c.trim()}</code></pre>`);
  const lines = esc.split("\n"); let out = [], inList = false;
  for (const line of lines) {
    let l = line
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/(^|\s)\*([^*\s][^*]*)\*/g, "$1<em>$2</em>");
    const h = l.match(/^(#{1,3})\s+(.*)/);
    const li = l.match(/^\s*[-*]\s+(.*)/);
    if (li) { if (!inList) { out.push("<ul>"); inList = true; } out.push(`<li>${li[1]}</li>`); continue; }
    if (inList) { out.push("</ul>"); inList = false; }
    if (h) out.push(`<h${h[1].length+1}>${h[2]}</h${h[1].length+1}>`);
    else if (l.trim()) out.push(`<p>${l}</p>`);
  }
  if (inList) out.push("</ul>");
  return out.join("");
}

// ── Health badge ──────────────────────────────────────────────
async function loadHealth() {
  try {
    const h = await api("/health");
    const ok = h.status === "ok";
    $("healthDot").className = "dot " + (ok ? "ok" : "warn");
    $("healthText").textContent = `${h.provider.provider} · ${h.provider.model}` + (ok ? "" : " (degraded)");
    $("healthText").title = h.provider.detail;
  } catch (e) {
    $("healthDot").className = "dot err";
    $("healthText").textContent = "API unreachable";
  }
}

// ── Stats table ───────────────────────────────────────────────
async function loadStats() {
  try {
    const s = await api("/stats");
    $("stats").innerHTML = Object.entries(s)
      .map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("");
  } catch (e) { $("stats").innerHTML = `<tr><td colspan=2>${e.message}</td></tr>`; }
}

// ── Dataset dropdown ──────────────────────────────────────────
async function loadDatasets() {
  try {
    const d = await api("/datasets");
    $("dataset").innerHTML = Object.entries(d)
      .map(([k, v]) => `<option value="${k}" title="${v}">${k}</option>`).join("");
  } catch (e) { /* non-fatal */ }
}

// ── Query flow ────────────────────────────────────────────────
let timer = null;
async function ask() {
  const q = $("query").value.trim();
  if (q.length < 3) return;
  $("ask").disabled = true;
  $("resultPanel").classList.add("hidden");
  const t0 = Date.now();
  $("status").innerHTML = `<span class="spinner"></span> agents working… <span id="elapsed">0</span>s`;
  timer = setInterval(() => { const el = $("elapsed"); if (el) el.textContent = Math.round((Date.now()-t0)/1000); }, 1000);
  try {
    const r = await api("/query", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({query: q}),
    });
    const ok = r.verdict === "APPROVED";
    $("chips").innerHTML = `
      <span class="chip ${ok ? "ok" : "warn"}">${r.verdict}</span>
      <span class="chip">score ${r.score}/10</span>
      <span class="chip">${r.retrieved_count} chunks</span>
      <span class="chip">${r.metrics.total_seconds}s</span>
      <span class="chip">${r.metrics.revision_cycles} revision${r.metrics.revision_cycles === 1 ? "" : "s"}</span>`;
    $("answer").innerHTML = md(r.final_answer || "(empty answer)");
    $("timings").innerHTML = Object.entries(r.metrics.steps || {})
      .map(([k, v]) => `<tr><td>${k}</td><td>${v}s</td></tr>`).join("");
    $("resultPanel").classList.remove("hidden");
    $("status").textContent = "";
  } catch (e) {
    $("status").textContent = "✗ " + e.message;
  } finally {
    clearInterval(timer);
    $("ask").disabled = false;
  }
}

// ── Ingest / refresh ──────────────────────────────────────────
async function ingest() {
  $("kbStatus").textContent = "scheduling…";
  try {
    const r = await api("/ingest/dataset", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({name: $("dataset").value, max_docs: +$("maxDocs").value || 100}),
    });
    $("kbStatus").textContent = `⏳ ${r.dataset} ingesting in background — stats update when done`;
    pollStats();
  } catch (e) { $("kbStatus").textContent = "✗ " + e.message; }
}
async function refreshData() {
  $("kbStatus").textContent = "scheduling refresh…";
  try {
    await api("/refresh", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({pull_datasets: true}),
    });
    $("kbStatus").textContent = "⏳ refresh running in background";
    pollStats();
  } catch (e) { $("kbStatus").textContent = "✗ " + e.message; }
}
let pollN = 0;
function pollStats() {
  pollN = 0;
  const iv = setInterval(async () => {
    await loadStats();
    if (++pollN > 30) { clearInterval(iv); $("kbStatus").textContent = ""; }
  }, 5000);
}

// ── Examples ──────────────────────────────────────────────────
const EXAMPLES = [
  "How does RAG work and why is it better than a plain LLM?",
  "What are qubits and how do they differ from classical bits?",
  "Compare FAISS and ChromaDB — when should I use each?",
];
$("examples").innerHTML = EXAMPLES
  .map(q => `<button type="button">${q}</button>`).join("");
$("examples").addEventListener("click", e => {
  if (e.target.tagName === "BUTTON") { $("query").value = e.target.textContent; ask(); }
});

$("ask").addEventListener("click", ask);
$("query").addEventListener("keydown", e => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) ask();
});
$("ingest").addEventListener("click", ingest);
$("refresh").addEventListener("click", refreshData);

loadHealth(); loadStats(); loadDatasets();
setInterval(loadHealth, 30000);
</script>
</body>
</html>
